services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_notes
    ports:
      - "6543:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ainotes-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ai-notes-backend
    container_name: ai-notes-backend
    restart: always
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      RUNNING_IN_DOCKER: "true"
    command: npm run start:dev
    networks:
      - ainotes-net

  frontend:
    build:
      context: ../Prysmic-frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    volumes:
      - ../Prysmic-frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    env_file:
      - ../Prysmic-frontend/.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      API_PROXY_TARGET: http://backend:3001
    command: npm run dev
    networks:
      - ainotes-net

volumes:
  db_data:

networks:
  ainotes-net:
